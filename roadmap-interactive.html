<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=980, initial-scale=1.0">
<title>Flamora Roadmap — Interactive Edge Cases</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  
  :root {
    --gold: #FCD34D;
    --pink: #FCA5A5;
    --purple: #A78BFA;
    --bg: #000;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.07);
  }

  body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    color: white;
    padding: 32px 24px 60px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .page-header h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .page-header p {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }

  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    justify-content: center;
    max-width: 1300px;
    margin: 0 auto;
  }
  .scenario-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 390px;
  }
  .scenario-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    padding-left: 2px;
  }
  .scenario-info {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    padding-left: 2px;
    line-height: 1.5;
    margin-bottom: 2px;
  }
  .situation-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .situation-badge.normal { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
  .situation-badge.notInvesting { background: rgba(252,213,77,0.15); color: var(--gold); }
  .situation-badge.cannotSave { background: rgba(252,165,165,0.15); color: var(--pink); }
  .situation-badge.almostFree { background: rgba(167,139,250,0.15); color: var(--purple); }
  .situation-badge.veryFar { background: rgba(252,165,165,0.1); color: rgba(252,165,165,0.7); }

  /* ====== PHONE ====== */
  .phone {
    width: 390px;
    height: 780px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    border: 2px solid rgba(255,255,255,0.06);
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }
  .phone-scroll {
    height: 100%;
    overflow-y: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
    scroll-behavior: smooth;
  }
  .phone-scroll::-webkit-scrollbar { display: none; }
  .phone-content {
    padding: 56px 26px 160px;
    min-height: 100%;
  }

  /* Eyebrow */
  .eyebrow {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 4px;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .eyebrow.show { opacity: 1; transform: translateY(0); }

  /* Title area */
  .title-area { position: relative; min-height: 80px; margin-bottom: 4px; }
  .title-before, .title-after {
    transition: opacity 0.5s ease;
  }
  .title-after {
    position: absolute; top: 0; left: 0; right: 0;
    opacity: 0; pointer-events: none;
  }
  .title-text {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.35;
    color: white;
  }
  .title-text .g {
    background: linear-gradient(90deg, var(--gold), var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .title-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }

  /* Legend */
  .legend-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    min-height: 18px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
  }
  .legend-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .legend-dot.current-dot { background: rgba(255,255,255,0.3); }
  .legend-dot.flamora-dot { background: linear-gradient(90deg, var(--gold), var(--pink)); }
  .legend-flamora {
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .legend-flamora.show { opacity: 1; }
  .info-i {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4);
    opacity: 0;
    transition: opacity 0.4s ease;
    cursor: pointer;
  }
  .info-i.show { opacity: 1; }

  /* ====== CHART ====== */
  .chart-wrap {
    position: relative;
    margin: 0 -14px;
    padding: 0 14px;
  }
  .chart {
    height: 200px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    position: relative;
    overflow: visible;
  }
  .bar-group {
    flex: 1;
    display: flex;
    align-items: flex-end;
    gap: 0px;
    min-width: 0;
    position: relative;
    transition: gap 0.3s ease;
  }
  .bar-group.dual { gap: 1.5px; }

  .bar {
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    min-width: 0;
    will-change: height, width, opacity;
  }
  .bar.gray-bar {
    transition: width 0.3s ease, height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .bar.grad-bar {
    background: linear-gradient(to top, var(--gold) 0%, var(--pink) 45%, var(--purple) 100%);
    transition: height 0.5s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.3s ease;
  }
  .bar.fire-bar {
    filter: drop-shadow(0 0 6px rgba(252,165,165,0.5));
  }

  /* Thumb */
  .thumb {
    position: absolute;
    bottom: -12px;
    width: 24px; height: 24px;
    transform: translateX(-12px);
    z-index: 20;
    pointer-events: none;
    transition: left 0.12s ease;
  }
  .thumb-outer {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1.5px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
  }
  .thumb-grip {
    width: 5px; height: 12px;
    border-radius: 3px;
    background: rgba(255,255,255,0.5);
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    z-index: 30;
    background: rgba(13,13,20,0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 8px 12px;
    pointer-events: none;
    white-space: nowrap;
    transition: left 0.1s ease, top 0.15s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .t-age { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 3px; }
  .tooltip .t-flamora { font-size: 13px; font-weight: 600; color: var(--pink); }
  .tooltip .t-current { font-size: 12px; color: rgba(255,255,255,0.3); }
  .tooltip .t-solo { font-size: 13px; font-weight: 600; color: white; }

  /* X axis */
  .x-axis {
    display: flex;
    justify-content: space-between;
    padding: 10px 0 0;
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
  }
  .x-end { transition: color 0.4s ease, opacity 0.4s ease; }
  .x-end.pink { color: var(--pink); }

  /* ====== CARDS ====== */
  .cards-area { margin-top: 4px; position: relative; min-height: 160px; }
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    transition: opacity 0.5s ease, transform 0.4s ease;
  }
  .cards-grid.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute; top: 0; left: 0; right: 0;
  }
  .data-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .data-card.show {
    opacity: 1;
    transform: translateY(0);
  }
  .card-label {
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
    text-transform: uppercase;
    min-height: 22px;
    display: flex;
    align-items: flex-end;
  }
  .card-value {
    font-size: 22px;
    font-weight: 700;
    color: white;
    line-height: 1.2;
  }
  .card-value.gold-grad {
    background: linear-gradient(90deg, var(--gold), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .card-value.accent { color: var(--gold); }
  .card-value.pink-v { color: var(--pink); }
  .card-badge {
    font-size: 13px;
    font-weight: 600;
    margin-left: 8px;
  }
  .card-value.gold-grad .card-badge,
  .card-value.accent .card-badge {
    -webkit-text-fill-color: white;
    color: white;
  }

  /* ====== CTA ====== */
  .cta-area {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 26px 36px;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 35%);
    z-index: 50;
    pointer-events: none;
  }
  .cta-stack { position: relative; height: 56px; pointer-events: auto; }
  .cta-btn {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 56px;
    border-radius: 100px;
    font-size: 15px; font-weight: 600;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, transform 0.3s ease;
  }
  .cta-btn:active { transform: scale(0.97); }
  .cta-before {
    background: white; color: black;
  }
  .cta-after {
    background: linear-gradient(135deg, var(--gold), var(--pink), var(--purple));
    color: white;
    box-shadow: 0 8px 16px rgba(252,165,165,0.25);
    opacity: 0; pointer-events: none;
  }
  .cta-hint {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 8px;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Flamora Roadmap — Interactive Prototype</h1>
  <p>Click "See My Flamora Plan" to trigger reveal. Drag on chart to scrub. Click "←" to reverse.</p>
</div>

<div class="grid" id="grid"></div>

<script>
// ============================================================
// FIRE ENGINE
// ============================================================
function calc(c) {
  const { income, expenses, netWorth, age, fireType = 'maintain' } = c;
  const mult = fireType === 'minimalist' ? 0.8 : fireType === 'upgrade' ? 1.5 : 1.0;
  const lifestyle = expenses * mult;
  const fireNum = lifestyle * 12 * 25;
  const savings = Math.max(0, income - expenses);
  const savRate = income > 0 ? ((income - expenses) / income) * 100 : 0;
  const extra = income * 0.08;
  const optSavings = savings + extra;
  const optRate = income > 0 ? (optSavings / income) * 100 : 0;

  function accumAt(n, m) {
    let a = netWorth;
    for (let i = 0; i < n; i++) a = a * 1.09 + m * 12;
    return a;
  }

  let yrs = 0, a = netWorth;
  if (savings <= 0 && netWorth <= 0) { yrs = 99; }
  else { while (a < fireNum && yrs < 99) { a = a * 1.09 + savings * 12; yrs++; } }
  const fAge = age + yrs;

  let oYrs = 0, oa = netWorth;
  if (optSavings <= 0) { oYrs = yrs; }
  else { while (oa < fireNum && oYrs < 100) { oa = oa * 1.09 + optSavings * 12; oYrs++; } }
  const oAge = age + oYrs;
  const saved = Math.max(0, fAge - oAge);

  let c1 = netWorth, c2 = netWorth;
  for (let i = 0; i < oYrs; i++) {
    c1 = c1 * 1.09 + savings * 12;
    c2 = c2 * 1.09 + optSavings * 12;
  }
  const extraVal = Math.max(0, c2 - c1);

  let sit = 'normal';
  if (savRate <= 0) sit = 'cannotSave';
  else if (fAge <= age + 5) sit = 'almostFree';
  else if (netWorth === 0 && savRate > 0) sit = 'notInvesting';
  else if (fAge > 65) sit = 'veryFar';

  const capYrs = Math.min(yrs, 50);
  const capAge = age + capYrs;

  return {
    income, expenses, netWorth, age, fireType, sit,
    savings, savRate, fireNum, lifestyle,
    extra, optSavings, optRate,
    fAge, oAge, saved, extraVal, accumAt,
    capAge, capYrs, isCapped: yrs >= 50,
    beforeYrs: capYrs,
    afterYrs: Math.max(1, oAge - age),
  };
}

function fmt(v) {
  if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '$' + Math.round(v/1e3) + 'K';
  return '$' + Math.round(v);
}
function fmtF(v) { return '$' + Math.round(v).toLocaleString('en-US'); }

// ============================================================
// BUILD PHONE UI
// ============================================================
const scenarios = [
  { id: 'A', label: 'Normal', desc: 'Income $8K · Expenses $6.5K · NW $100K · Age 28 · Upgrade', cfg: { income:8000, expenses:6500, netWorth:100000, age:28, fireType:'upgrade' } },
  { id: 'B', label: 'Not Investing', desc: 'Income $6K · Expenses $4.5K · NW $0 · Age 25 · Maintain', cfg: { income:6000, expenses:4500, netWorth:0, age:25, fireType:'maintain' } },
  { id: 'C', label: 'Cannot Save', desc: 'Income $5K · Expenses $5K · NW $0 · Age 30 · Maintain', cfg: { income:5000, expenses:5000, netWorth:0, age:30, fireType:'maintain' } },
  { id: 'D', label: 'Almost Free', desc: 'Income $12K · Expenses $4K · NW $800K · Age 35 · Minimalist', cfg: { income:12000, expenses:4000, netWorth:800000, age:35, fireType:'minimalist' } },
  { id: 'E', label: 'Very Far', desc: 'Income $4K · Expenses $3.5K · NW $0 · Age 22 · Maintain', cfg: { income:4000, expenses:3500, netWorth:0, age:22, fireType:'maintain' } },
];

const grid = document.getElementById('grid');

scenarios.forEach(s => {
  const d = calc(s.cfg);
  const wrap = document.createElement('div');
  wrap.className = 'scenario-wrap';
  wrap.innerHTML = `
    <div>
      <span class="scenario-tag">${s.id} · ${s.label}</span>
      <span class="situation-badge ${d.sit}">${d.sit}</span>
    </div>
    <div class="scenario-info">${s.desc}</div>
  `;
  const phone = document.createElement('div');
  phone.className = 'phone';
  wrap.appendChild(phone);
  grid.appendChild(wrap);
  initPhone(phone, d);
});

function initPhone(phone, d) {
  // State
  let revealed = false;
  let selectedIdx = null;
  let isDragging = false;
  let counterProgress = 0;
  let counterRAF = null;

  // Displayed years helper
  function getDispYears(total) {
    if (total > 30) return Array.from({length: total}, (_,i) => i).filter(i => i % 2 === 0);
    return Array.from({length: total}, (_,i) => i);
  }

  const beforeDispYears = getDispYears(d.beforeYrs);
  const afterDispYears = getDispYears(d.afterYrs);

  function dispYears() { return revealed ? afterDispYears : beforeDispYears; }

  // Build DOM
  phone.innerHTML = `
    <div class="phone-scroll">
      <div class="phone-content">
        <div class="eyebrow">PREDICT</div>
        <div class="title-area">
          <div class="title-before">
            <div class="title-text">${beforeTitle(d)}</div>
            <div class="title-sub">${beforeSub(d)}</div>
          </div>
          <div class="title-after">
            <div class="title-text">${afterTitle(d)}</div>
            <div class="title-sub">${afterSub(d)}</div>
          </div>
        </div>
        <div class="legend-row">
          <div class="legend-flamora legend-item"><div class="legend-dot flamora-dot"></div>Flamora</div>
          <div class="legend-item"><div class="legend-dot current-dot"></div>Current</div>
          <div class="info-i">i</div>
        </div>
        <div class="chart-wrap">
          <div class="chart" id="chart"></div>
          <div class="tooltip" id="tip"></div>
          <div class="thumb" id="thumb"><div class="thumb-outer"><div class="thumb-grip"></div></div></div>
        </div>
        <div class="x-axis"><span>Today</span><span class="x-end" id="xEnd">${beforeXEnd(d)}</span></div>
        <div class="cards-area">
          <div class="cards-grid before-cards" id="bCards">${beforeCards(d)}</div>
          <div class="cards-grid after-cards hidden" id="aCards">${afterCards(d)}</div>
        </div>
      </div>
    </div>
    <div class="cta-area">
      <div class="cta-stack">
        <button class="cta-btn cta-before" id="ctaBefore">See My Flamora Plan</button>
        <button class="cta-btn cta-after" id="ctaAfter">Get My Real Numbers →</button>
      </div>
      <div class="cta-hint" id="ctaHint">Unlock your optimized roadmap</div>
    </div>
  `;

  // Refs
  const el = (sel) => phone.querySelector(sel);
  const els = (sel) => phone.querySelectorAll(sel);
  const chartEl = el('#chart');
  const tipEl = el('#tip');
  const thumbEl = el('#thumb');
  const scrollEl = phone.querySelector('.phone-scroll');

  // ---- BUILD BARS ----
  let barEls = [];

  function buildBars() {
    chartEl.innerHTML = '';
    barEls = [];
    const dy = dispYears();
    dy.forEach((year, i) => {
      const group = document.createElement('div');
      group.className = 'bar-group';
      const gray = document.createElement('div');
      gray.className = 'bar gray-bar';
      gray.style.height = '2px';
      gray.style.width = '100%';
      gray.style.background = 'rgba(255,255,255,0.12)';
      group.appendChild(gray);

      const grad = document.createElement('div');
      grad.className = 'bar grad-bar';
      grad.style.height = '0px';
      grad.style.width = '0px';
      grad.style.opacity = '0';
      group.appendChild(grad);

      chartEl.appendChild(group);
      barEls.push({ group, gray, grad, year });
    });
    selectedIdx = null;
  }

  function getVals(dy, monthly) {
    return dy.map(y => d.accumAt(y + 1, monthly));
  }

  function getMaxVal(curVals, optVals) {
    return Math.max(...curVals, ...(optVals || [0]), 1);
  }

  function grayOpacity(norm) {
    return 0.1 + norm * 0.55;
  }

  // ---- POSITION THUMB + TOOLTIP ----
  function positionScrubber(idx) {
    if (idx == null) idx = barEls.length - 1;
    idx = Math.max(0, Math.min(idx, barEls.length - 1));
    const group = barEls[idx]?.group;
    if (!group) return;
    const chartRect = chartEl.getBoundingClientRect();
    const gRect = group.getBoundingClientRect();
    const cx = gRect.left + gRect.width / 2 - chartRect.left;
    thumbEl.style.left = cx + 'px';

    // Tooltip content
    const dy = dispYears();
    const year = dy[idx];
    const age = d.age + year + 1;
    const curVal = d.accumAt(year + 1, d.savings);
    const optVal = d.accumAt(year + 1, d.optSavings);
    const barAge = d.age + year + 1;
    const showOpt = revealed && barAge <= d.oAge;

    if (showOpt) {
      tipEl.innerHTML = `<div class="t-age">Age ${age}</div><div class="t-flamora">Flamora: ${fmt(optVal)}</div><div class="t-current">Current: ${fmt(curVal)}</div>`;
    } else if (d.sit === 'cannotSave' && !revealed) {
      tipEl.innerHTML = `<div class="t-age">Age ${age}</div><div class="t-solo">$0</div>`;
    } else {
      tipEl.innerHTML = `<div class="t-age">Age ${age}</div><div class="t-solo">${fmt(curVal)}</div>`;
    }

    // Tooltip position
    const tipW = tipEl.offsetWidth || 100;
    let tipX = cx - tipW / 2;
    tipX = Math.max(4, Math.min(tipX, chartRect.width - tipW - 4));

    // Find tallest bar at this index
    const grayH = barEls[idx].gray.offsetHeight || 0;
    const gradH = barEls[idx].grad.offsetHeight || 0;
    const tallest = Math.max(grayH, gradH);
    const tipY = Math.max(0, 200 - tallest - 56);

    tipEl.style.left = tipX + 'px';
    tipEl.style.top = tipY + 'px';
  }

  // ---- ANIMATIONS ----

  // Before: stagger gray bars in, 16ms apart, spring
  function animateBeforeBars() {
    const dy = dispYears();
    const curVals = getVals(dy, d.savings);
    const maxV = getMaxVal(curVals);
    const maxH = 200 * 0.85;
    const curYrs = d.sit === 'cannotSave' ? 0 : (d.isCapped ? d.beforeYrs : d.fAge - d.age);

    barEls.forEach((b, i) => {
      const year = b.year;
      const inRange = year < curYrs;
      const val = curVals[i] || 0;
      const hPct = inRange && val > 0 ? Math.max(2, (val / maxV) * maxH) : 2;
      const norm = maxH > 0 ? hPct / maxH : 0;
      const op = grayOpacity(norm);

      setTimeout(() => {
        b.gray.style.transition = 'height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        b.gray.style.height = hPct + 'px';
        b.gray.style.background = `rgba(255,255,255,${op.toFixed(2)})`;
        b.gray.style.width = '100%';
      }, i * 16);
    });

    // After all bars in, position scrubber
    setTimeout(() => {
      selectedIdx = barEls.length - 1;
      positionScrubber(selectedIdx);
      tipEl.classList.add('show');
    }, barEls.length * 16 + 300);
  }

  // Reveal: shrink to optimized range, dual layout, stagger gradient bars
  function animateReveal() {
    revealed = true;

    // Rebuild bars for optimized range
    buildBars();

    const dy = dispYears();
    const curVals = getVals(dy, d.savings);
    const optVals = getVals(dy, d.optSavings);
    const maxV = getMaxVal(curVals, optVals);
    const maxH = 200 * 0.85;
    const curYrs = d.fAge - d.age;

    // Immediately set gray bars to full height + half width (dual layout)
    barEls.forEach((b, i) => {
      const year = b.year;
      const inRange = year < curYrs;
      const val = curVals[i] || 0;
      const hPct = inRange && val > 0 ? Math.max(2, (val / maxV) * maxH) : 2;
      const norm = maxH > 0 ? hPct / maxH : 0;
      const op = grayOpacity(norm);

      b.gray.style.transition = 'none';
      b.gray.style.height = hPct + 'px';
      b.gray.style.background = `rgba(255,255,255,${op.toFixed(2)})`;

      // Dual layout
      b.group.classList.add('dual');
      b.gray.style.transition = 'width 0.3s ease';
      b.gray.style.width = '45%';
      b.grad.style.width = '45%';
      b.grad.style.height = '0px';
      b.grad.style.opacity = '1';
    });

    // Stagger gradient bars: 45ms apart
    barEls.forEach((b, i) => {
      const year = b.year;
      const barAge = d.age + year + 1;
      const inOpt = barAge <= d.oAge;
      const isFireBar = barAge === d.oAge;
      const optVal = optVals[i] || 0;
      const hPct = inOpt && optVal > 0 ? Math.max(2, (optVal / maxV) * maxH) : 0;

      setTimeout(() => {
        b.grad.style.transition = 'height 0.5s cubic-bezier(0.34, 1.4, 0.64, 1)';
        b.grad.style.height = hPct + 'px';
        if (isFireBar) b.grad.classList.add('fire-bar');
      }, i * 45);
    });

    const totalStagger = barEls.length * 0.045;
    const afterCardsStart = totalStagger + 0.3;

    // Title crossfade
    setTimeout(() => {
      el('.title-before').style.opacity = '0';
      el('.title-after').style.opacity = '1';
    }, (totalStagger + 0.15) * 1000);

    // Legend
    setTimeout(() => {
      el('.legend-flamora').classList.add('show');
      el('.info-i').classList.add('show');
    }, totalStagger * 1000);

    // X axis
    setTimeout(() => {
      const xEnd = el('#xEnd');
      xEnd.textContent = afterXEnd(d);
      xEnd.classList.add('pink');
    }, totalStagger * 1000);

    // Cards: hide before, show after with stagger
    setTimeout(() => {
      el('#bCards').classList.add('hidden');
      el('#aCards').classList.remove('hidden');
      startCounting();

      const aCards = els('#aCards .data-card');
      aCards.forEach((c, i) => {
        setTimeout(() => c.classList.add('show'), i * 200);
      });
    }, afterCardsStart * 1000);

    // CTA
    setTimeout(() => {
      el('#ctaBefore').style.opacity = '0';
      el('#ctaBefore').style.pointerEvents = 'none';
      el('#ctaAfter').style.opacity = '1';
      el('#ctaAfter').style.pointerEvents = 'auto';
      el('#ctaHint').textContent = 'Connect accounts for live tracking';
    }, (afterCardsStart + 0.8) * 1000);

    // Tooltip
    setTimeout(() => {
      selectedIdx = barEls.length - 1;
      positionScrubber(selectedIdx);
    }, barEls.length * 45 + 500);
  }

  // Reverse reveal
  function animateReverse() {
    // Stagger gradient bars down right-to-left
    const count = barEls.length;
    for (let i = 0; i < count; i++) {
      const ri = count - 1 - i;
      setTimeout(() => {
        barEls[ri].grad.style.transition = 'height 0.3s ease-in';
        barEls[ri].grad.style.height = '0px';
      }, i * 45);
    }

    // Fade out after UI
    el('#ctaAfter').style.opacity = '0';
    el('#ctaAfter').style.pointerEvents = 'none';
    els('#aCards .data-card').forEach(c => c.classList.remove('show'));

    setTimeout(() => {
      el('.title-after').style.opacity = '0';
    }, 200);

    setTimeout(() => {
      el('.legend-flamora').classList.remove('show');
      el('.info-i').classList.remove('show');
    }, 200);

    const staggerEnd = count * 0.045 + 0.3;

    // Collapse dual layout
    setTimeout(() => {
      barEls.forEach(b => {
        b.group.classList.remove('dual');
        b.gray.style.width = '100%';
        b.grad.style.width = '0px';
        b.grad.style.opacity = '0';
      });
    }, staggerEnd * 1000);

    // Rebuild before bars
    setTimeout(() => {
      revealed = false;
      counterProgress = 0;
      if (counterRAF) cancelAnimationFrame(counterRAF);

      buildBars();
      animateBeforeBars();

      // Restore titles
      el('.title-before').style.opacity = '1';

      // Restore cards
      el('#bCards').classList.remove('hidden');
      el('#aCards').classList.add('hidden');
      els('#bCards .data-card').forEach(c => c.classList.add('show'));

      // Restore CTA
      el('#ctaBefore').style.opacity = '1';
      el('#ctaBefore').style.pointerEvents = 'auto';
      el('#ctaHint').textContent = 'Unlock your optimized roadmap';

      // X axis
      const xEnd = el('#xEnd');
      xEnd.textContent = beforeXEnd(d);
      xEnd.classList.remove('pink');
    }, (staggerEnd + 0.3) * 1000);
  }

  // Counting animation (easeOut cubic, 1.5s)
  function startCounting() {
    const start = performance.now();
    const duration = 1500;
    function tick(now) {
      const elapsed = now - start;
      const t = Math.min(1, elapsed / duration);
      counterProgress = 1 - Math.pow(1 - t, 3);
      updateCounters();
      if (t < 1) counterRAF = requestAnimationFrame(tick);
    }
    counterRAF = requestAnimationFrame(tick);
  }

  function updateCounters() {
    const extraDisp = d.extraVal * counterProgress;
    const rateDisp = d.optRate * counterProgress;
    const fireDisp = d.fireNum * counterProgress;

    const cards = els('#aCards .data-card .card-value');
    if (cards[0]) {
      if (d.sit === 'cannotSave') {
        cards[0].innerHTML = fmtF(d.extra) + '/mo';
      } else {
        cards[0].innerHTML = '+' + fmt(extraDisp);
      }
    }
    if (cards[2]) {
      const base = Math.round(rateDisp);
      const inc = Math.round(d.optRate - d.savRate);
      if (inc > 0) {
        cards[2].innerHTML = `${base}%<span class="card-badge">↑${inc}%</span>`;
      } else {
        cards[2].innerHTML = `${base}%`;
      }
    }
    if (cards[3]) {
      cards[3].innerHTML = fmt(fireDisp);
    }
  }

  // ---- DRAG / SCRUB ----
  function setupDrag() {
    chartEl.addEventListener('pointerdown', onPointerDown);
    chartEl.addEventListener('pointermove', onPointerMove);
    chartEl.addEventListener('pointerup', onPointerUp);
    chartEl.addEventListener('pointerleave', onPointerUp);
  }
  function onPointerDown(e) {
    isDragging = true;
    chartEl.setPointerCapture(e.pointerId);
    updateScrubFromEvent(e);
  }
  function onPointerMove(e) {
    if (!isDragging) return;
    updateScrubFromEvent(e);
  }
  function onPointerUp() { isDragging = false; }
  function updateScrubFromEvent(e) {
    const rect = chartEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const count = barEls.length;
    if (count === 0) return;
    const step = rect.width / count;
    const idx = Math.max(0, Math.min(Math.floor(x / step), count - 1));
    selectedIdx = idx;
    positionScrubber(idx);
  }

  // ---- INIT SEQUENCE ----
  buildBars();
  setupDrag();

  // Auto-play Before entry (matches Swift: 0.3s delay for bars, 0.7s for cards, 0.9s for CTA)
  setTimeout(() => el('.eyebrow').classList.add('show'), 100);

  setTimeout(() => {
    animateBeforeBars();
  }, 300);

  setTimeout(() => {
    els('#bCards .data-card').forEach((c, i) => {
      setTimeout(() => c.classList.add('show'), i * 80);
    });
  }, 700);

  setTimeout(() => {
    el('#ctaBefore').style.opacity = '1';
  }, 900);

  // CTA click -> reveal
  el('#ctaBefore').addEventListener('click', () => {
    if (revealed) return;
    scrollEl.scrollTo({ top: 0, behavior: 'smooth' });
    animateReveal();
  });

  // Back button (click title area to reverse for prototype)
  el('.eyebrow').style.cursor = 'pointer';
  el('.eyebrow').addEventListener('click', () => {
    if (revealed) animateReverse();
  });
}

// ============================================================
// TITLE / CARD GENERATORS
// ============================================================
function beforeTitle(d) {
  if (d.sit === 'cannotSave')
    return `At your current pace, financial freedom is <span class="g">out of reach</span>.`;
  if (d.isCapped)
    return `You will reach financial independence at age <span class="g">${d.capAge}+</span>.`;
  return `You will reach financial independence at age <span class="g">${d.fAge}</span>.`;
}
function beforeSub(d) {
  if (d.sit === 'cannotSave') return `You're spending everything you earn.`;
  if (d.sit === 'notInvesting') return `Your savings projected with 9% average annual returns.`;
  return `Based on your current savings — no optimization.`;
}
function afterTitle(d) {
  if (d.sit === 'cannotSave')
    return `With Flamora, just <span class="g">${fmtF(d.extra)}/mo</span> gets you free by age <span class="g">${d.oAge}</span>.`;
  if (d.saved === 0)
    return `With Flamora, you'll build <span class="g">${fmt(d.extraVal)} more</span> by age <span class="g">${d.oAge}</span>.`;
  const yt = d.saved === 1 ? '1 year' : `${d.saved} years`;
  return `With Flamora, you'll be free by <span class="g">${d.oAge}</span> — that's <span class="g">${yt} sooner</span>.`;
}
function afterSub(d) {
  if (d.sit === 'cannotSave') return `Your current path has no timeline to freedom.`;
  if (d.saved === 0) return `You're already close — Flamora helps you finish strong.`;
  const label = d.isCapped ? d.capAge + '+' : d.fAge;
  return `Your current path has you working until ${label}.`;
}
function beforeXEnd(d) {
  if (d.sit === 'cannotSave') return '30 yrs';
  const yr = 2026 + (d.isCapped ? d.capYrs : d.fAge - d.age);
  return '' + yr;
}
function afterXEnd(d) {
  return '' + (2026 + d.afterYrs);
}
function beforeCards(d) {
  if (d.sit === 'cannotSave') return `
    <div class="data-card"><div class="card-label">MONTHLY INCOME</div><div class="card-value">${fmtF(d.income)}</div></div>
    <div class="data-card"><div class="card-label">MONTHLY EXPENSES</div><div class="card-value">${fmtF(d.expenses)}</div></div>
    <div class="data-card"><div class="card-label">SAVINGS RATE</div><div class="card-value">0%</div></div>
    <div class="data-card"><div class="card-label">NET WORTH</div><div class="card-value">${fmtF(d.netWorth)}</div></div>`;
  return `
    <div class="data-card"><div class="card-label">MONTHLY INCOME</div><div class="card-value">${fmtF(d.income)}</div></div>
    <div class="data-card"><div class="card-label">CURRENT INVESTMENT</div><div class="card-value">${fmtF(d.netWorth)}</div></div>
    <div class="data-card"><div class="card-label">SAVINGS RATE</div><div class="card-value">${Math.round(d.savRate)}%</div></div>
    <div class="data-card"><div class="card-label">LIFESTYLE SPENDING</div><div class="card-value">${fmtF(d.lifestyle)}</div></div>`;
}
function afterCards(d) {
  const inc = Math.round(d.optRate - d.savRate);
  const days = d.saved * 365;
  const badgeDown = d.saved > 0 ? `<span class="card-badge">↓${days.toLocaleString()} days</span>` : '';
  const badgeUp = inc > 0 ? `<span class="card-badge">↑${inc}%</span>` : '';

  if (d.sit === 'cannotSave') return `
    <div class="data-card"><div class="card-label">MONTHLY INVESTMENT</div><div class="card-value gold-grad">${fmtF(d.extra)}/mo</div></div>
    <div class="data-card"><div class="card-label">FREEDOM AGE</div><div class="card-value accent">${d.oAge}</div></div>
    <div class="data-card"><div class="card-label">SAVINGS RATE</div><div class="card-value accent">${Math.round(d.optRate)}%<span class="card-badge">↑${Math.round(d.optRate)}%</span></div></div>
    <div class="data-card"><div class="card-label">FREEDOM #</div><div class="card-value pink-v">${fmt(d.fireNum)}</div></div>`;

  return `
    <div class="data-card"><div class="card-label">EXTRA PORTFOLIO VALUE</div><div class="card-value gold-grad">+${fmt(d.extraVal)}</div></div>
    <div class="data-card"><div class="card-label">FREEDOM AGE</div><div class="card-value accent">${d.oAge}${badgeDown}</div></div>
    <div class="data-card"><div class="card-label">SAVINGS RATE</div><div class="card-value accent">${Math.round(d.optRate)}%${badgeUp}</div></div>
    <div class="data-card"><div class="card-label">FREEDOM #</div><div class="card-value pink-v">${fmt(d.fireNum)}</div></div>`;
}
</script>
